version: "3.9"

services:
  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  worker:
    build: .
    command: celery -A app.tasks.tasks.celery_app worker --loglevel=info -Q ai,notifications,scoring,reports -c 4
    volumes:
      - .:/app
    env_file: .env
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  beat:
    build: .
    command: celery -A app.tasks.tasks.celery_app beat --loglevel=info
    volumes:
      - .:/app
    env_file: .env
    depends_on:
      - redis
    restart: unless-stopped

  flower:
    build: .
    command: celery -A app.tasks.tasks.celery_app flower --port=5555
    ports:
      - "5555:5555"
    env_file: .env
    depends_on:
      - redis
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: murex
      POSTGRES_PASSWORD: murex123
      POSTGRES_DB: murex_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: murex
      MINIO_ROOT_PASSWORD: murex123
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:
